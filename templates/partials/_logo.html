{% comment %}Veridex scan-badge mark — squircle, gradient stroke, check that doubles as a V, scan line. Scales to 16px.{% endcomment %}
<svg class="logo-mark" width="{{ size|default:28 }}" height="{{ size|default:28 }}" viewBox="0 0 32 32" fill="none" aria-hidden="true" focusable="false">
  <defs>
    <linearGradient id="vdx-grad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10D0BE"/><stop offset="1" stop-color="#4F7CFF"/>
    </linearGradient>
  </defs>
  <rect x="2.2" y="2.2" width="27.6" height="27.6" rx="9" stroke="url(#vdx-grad)" stroke-width="2.4"/>
  <path d="M9 14.5l4.6 5.2L23 10.2" stroke="url(#vdx-grad)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="8" y1="23.5" x2="24" y2="23.5" stroke="#10D0BE" stroke-width="2.2" stroke-linecap="round" opacity="0.85"/>
</svg>
